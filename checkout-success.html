<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#0a0a09" />
  <title>Zahlung bestätigt — ZENITH</title>
  <meta name="robots" content="noindex" />
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    :root{--ink:#f7f2e7;--muted:#bcb5a6;--soft:#8a8273;--gold:#e7be6c;--gold2:#ffe2a0;--amber:#f0a23a;--line:rgba(231,190,108,.2);--card-line:rgba(255,255,255,.1)}
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;font-family:Inter,system-ui,sans-serif;color:var(--ink);line-height:1.6;display:grid;place-items:center;padding:28px 18px;
      background-color:#0a0a09;background-image:radial-gradient(720px 440px at 12% -4%,rgba(231,190,108,.14),transparent 62%),radial-gradient(680px 520px at 92% 6%,rgba(231,190,108,.07),transparent 60%),linear-gradient(180deg,#0c0b0a,#0a0a09 55%,#080807);background-repeat:no-repeat;background-size:100% 100%;-webkit-font-smoothing:antialiased}
    .card{width:min(620px,100%);padding:clamp(26px,5vw,42px);border:1px solid var(--line);border-radius:24px;background:linear-gradient(180deg,rgba(255,255,255,.06),rgba(255,255,255,.02));box-shadow:0 36px 100px rgba(0,0,0,.55)}
    .brand{display:inline-flex;align-items:center;gap:11px;margin-bottom:22px;color:var(--ink);text-decoration:none}
    .z{width:40px;height:40px;display:grid;place-items:center;border-radius:12px;background:linear-gradient(140deg,#ffe9bd,#e7be6c 45%,#c9912f);color:#120c04;font-weight:900;font-size:20px}
    .brand strong{letter-spacing:.22em;font-size:16px;display:block;line-height:1.1}
    .brand em{font-style:normal;color:var(--gold2);font-size:11px;letter-spacing:.08em}
    .check-ico{width:58px;height:58px;border-radius:50%;display:grid;place-items:center;background:rgba(231,190,108,.14);border:1px solid var(--line);color:var(--gold2);font-size:30px;margin-bottom:18px}
    h1{margin:0;font-size:clamp(26px,4vw,38px);letter-spacing:-.03em;line-height:1.05}
    .lead{margin:14px 0 0;color:var(--muted);font-size:17px}
    .rows{margin:24px 0 0;display:grid;gap:10px}
    .row{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;padding:15px 16px;border:1px solid var(--card-line);border-radius:14px;background:rgba(255,255,255,.04)}
    .row strong{font-size:15px}
    .row-actions{display:flex;gap:8px;flex-wrap:wrap}
    .row a,.row button{font:inherit;padding:9px 15px;border-radius:999px;border:1px solid var(--line);background:rgba(231,190,108,.12);color:var(--gold2);font-size:13px;font-weight:800;text-decoration:none;cursor:pointer}
    .row a:hover,.row button:hover{color:#fff}
    .note{margin:22px 0 0;padding:14px 16px;border:1px solid var(--line);border-left:3px solid var(--gold);border-radius:12px;background:rgba(231,190,108,.07);color:#e7e0cf;font-size:13.5px;line-height:1.55}
    .help{margin:22px 0 0;padding:14px 16px;border:1px solid var(--card-line);border-radius:12px;background:rgba(255,255,255,.04);color:var(--muted);font-size:13.5px;line-height:1.6}
    .help .button{margin-top:12px;padding:0 18px;min-height:40px;font-size:13.5px}
    .actions{margin:24px 0 0;display:flex;gap:12px;flex-wrap:wrap}
    .button{min-height:48px;display:inline-flex;align-items:center;justify-content:center;padding:0 22px;border-radius:999px;font-weight:800;font-size:15px;text-decoration:none;cursor:pointer}
    .primary{color:#170f04;background:linear-gradient(135deg,#ffe9bd,#e7be6c 50%,#f0a23a)}
    .ghost{border:1px solid var(--card-line);background:rgba(255,255,255,.05);color:#f5eedf}
    .muted{color:var(--soft)}
    a:focus-visible,.button:focus-visible{outline:3px solid rgba(231,190,108,.9);outline-offset:3px}
    .hidden{display:none}
    .legal-foot{margin:26px 0 0;padding-top:18px;border-top:1px solid rgba(255,255,255,.08);display:flex;flex-wrap:wrap;gap:16px}
    .legal-foot a{color:var(--gold2);font-size:13.5px;font-weight:700}
  </style>
</head>
<body>
  <main class="card">
    <a class="brand" href="index.html"><span class="z" aria-hidden="true">Z</span><span><strong>ZENITH</strong><em>Gym Coaching</em></span></a>
    <div class="check-ico" id="ico" aria-hidden="true">✓</div>
    <h1 id="title">Zahlung wird geprüft …</h1>
    <p class="lead" id="lead">Einen Moment, wir bestätigen deine Bestellung.</p>
    <div class="rows hidden" id="rows"></div>
    <div class="note hidden" id="note"></div>
    <div class="help hidden" id="help"></div>
    <div class="actions">
      <a class="button primary" href="account.html">Zu meinem Konto</a>
      <a class="button ghost" href="index.html">Startseite</a>
    </div>
    <div class="legal-foot">
      <a href="impressum.html">Impressum</a>
      <a href="datenschutz.html">Datenschutz</a>
      <a href="agb.html">AGB</a>
      <a href="widerruf.html">Widerruf</a>
    </div>
  </main>
  <script>
    (function () {
      let lang;
      try { lang = localStorage.getItem('zenith_lang_v1') === 'en' ? 'en' : 'de'; } catch (e) { lang = 'de'; }
      document.documentElement.lang = lang;

      const I18N = {
        de: {
          docTitle: 'Zahlung bestätigt — ZENITH',
          checking: 'Zahlung wird geprüft …',
          checkingLead: 'Einen Moment, wir bestätigen deine Bestellung.',
          btnAccount: 'Zu meinem Konto',
          btnHome: 'Startseite',
          legal: ['Impressum', 'Datenschutz', 'AGB', 'Widerruf'],
          mailSubject: 'ZENITH Bestellung prüfen',
          mailSession: 'Session-ID: ',
          mailNoSession: '(keine Session-ID in der URL gefunden)',
          mailAsk: 'Bitte gib hier deine Kauf-E-Mail-Adresse an: ',
          contactSupport: 'Support kontaktieren',
          failTitle: 'Bestellung',
          copied: 'Kopiert ✓',
          copyManual: 'Bitte manuell kopieren',
          openOnline: 'Online ansehen',
          downloadPdf: 'PDF herunterladen',
          copyLink: 'Link kopieren',
          noSidTitle: 'Keine Bestellnummer gefunden',
          noSidLead: 'Falls du gerade bezahlt hast, prüfe in ein bis zwei Minuten dein Konto — deine Pläne erscheinen dort automatisch. Kommt dort nichts an, melde dich gern bei uns.',
          noSidHelp: 'Wir helfen dir schnell weiter, wenn du uns kurz deine Kauf-E-Mail schickst:',
          retry: [
            'Zahlung wird bestätigt …',
            'Noch ein Moment — Stripe kann kurz brauchen …',
            'Fast geschafft, wir prüfen weiter …',
            'Letzte Prüfung läuft …',
            'Letzter Versuch …'
          ],
          confirmedTitle: 'Danke! Zahlung bestätigt.',
          plansUnlocked: 'Deine Pläne sind freigeschaltet:',
          saveLinkNote: 'Speichere diesen Link gut sichtbar — er ist dein Zugang zu den Plänen. Du kannst jeden Plan online öffnen oder als PDF herunterladen. Wenn E-Mail-Versand aktiviert ist, bekommst du zusätzlich eine Nachricht mit den Links und PDFs.',
          orderFor1: 'Deine Bestellung für ',
          orderFor2: ' ist da.',
          emailFallback: 'deine E-Mail',
          optionalAccount: 'Optional: Melde dich im Konto an, um deine Käufe gebündelt zu sehen. ',
          toAccount: 'Zum Konto →',
          notConfirmedMsg: 'Wir konnten deine Zahlung noch nicht endgültig bestätigen.',
          notConfirmedTitle: 'Noch nicht bestätigt',
          notConfirmedHelp: 'Das kann an einer kurzen Verzögerung liegen. Falls sich das nicht von selbst klärt, melde dich gern bei uns — mit deiner Kauf-E-Mail geht die Prüfung am schnellsten:',
          connErrMsg: 'Die Verbindung zum Server war gerade instabil. Wir konnten deine Zahlung noch nicht bestätigen.',
          connErrTitle: 'Verbindung unterbrochen',
          connErrHelp: 'Bitte melde dich bei uns, damit wir deine Zahlung manuell prüfen können:'
        },
        en: {
          docTitle: 'Payment confirmed — ZENITH',
          checking: 'Checking your payment …',
          checkingLead: 'One moment — we’re confirming your order.',
          btnAccount: 'Go to my account',
          btnHome: 'Home',
          legal: ['Legal notice', 'Privacy policy', 'Terms', 'Cancellation policy'],
          mailSubject: 'Please check my ZENITH order',
          mailSession: 'Session ID: ',
          mailNoSession: '(no session ID found in the URL)',
          mailAsk: 'Please add the email address you used for the purchase: ',
          contactSupport: 'Contact support',
          failTitle: 'Order',
          copied: 'Copied ✓',
          copyManual: 'Please copy manually',
          openOnline: 'Open online',
          downloadPdf: 'Download PDF',
          copyLink: 'Copy link',
          noSidTitle: 'No order reference found',
          noSidLead: 'If you just paid, check your account in a minute or two — your plans will show up there automatically. If nothing arrives, feel free to contact us.',
          noSidHelp: 'We can help quickly if you send us the email address you used for the purchase:',
          retry: [
            'Confirming your payment …',
            'One more moment — Stripe can take a little while …',
            'Almost there, still checking …',
            'Final check in progress …',
            'Last attempt …'
          ],
          confirmedTitle: 'Thank you! Payment confirmed.',
          plansUnlocked: 'Your plans are unlocked:',
          saveLinkNote: 'Keep this link somewhere safe — it is your access to your plans. You can open each plan online or download it as a PDF. If email delivery is enabled, you will also receive a message with the links and PDFs.',
          orderFor1: 'Your order for ',
          orderFor2: ' is confirmed.',
          emailFallback: 'your email address',
          optionalAccount: 'Optional: sign in to your account to see all your purchases in one place. ',
          toAccount: 'Go to account →',
          notConfirmedMsg: 'We could not fully confirm your payment yet.',
          notConfirmedTitle: 'Not confirmed yet',
          notConfirmedHelp: 'This may just be a short delay. If it does not resolve on its own, feel free to contact us — including your purchase email makes the check fastest:',
          connErrMsg: 'The connection to the server was unstable. We could not confirm your payment yet.',
          connErrTitle: 'Connection interrupted',
          connErrHelp: 'Please contact us so we can check your payment manually:'
        }
      };
      const T = I18N[lang];

      const sid = new URLSearchParams(location.search).get('session_id');
      const title = document.getElementById('title');
      const lead = document.getElementById('lead');
      const rows = document.getElementById('rows');
      const note = document.getElementById('note');
      const help = document.getElementById('help');
      const ico = document.getElementById('ico');

      // Statische Texte fuer EN ersetzen — das deutsche HTML bleibt No-JS-Fallback.
      if (lang === 'en') {
        document.title = T.docTitle;
        title.textContent = T.checking;
        lead.textContent = T.checkingLead;
        const actionBtns = document.querySelectorAll('.actions .button');
        if (actionBtns[0]) actionBtns[0].textContent = T.btnAccount;
        if (actionBtns[1]) actionBtns[1].textContent = T.btnHome;
        document.querySelectorAll('.legal-foot a').forEach((a, i) => { if (T.legal[i]) a.textContent = T.legal[i]; });
      }

      function esc(s) { return String(s).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c])); }

      function supportMailto(sessionId) {
        const subject = T.mailSubject;
        const lines = [
          sessionId ? (T.mailSession + sessionId) : T.mailNoSession,
          '',
          T.mailAsk
        ];
        return 'mailto:synastyles@gmail.com?subject=' + encodeURIComponent(subject) + '&body=' + encodeURIComponent(lines.join('\n'));
      }

      function showHelp(sessionId, text) {
        help.classList.remove('hidden');
        help.innerHTML = esc(text) +
          '<div><a class="button ghost" href="' + supportMailto(sessionId) + '">' + T.contactSupport + '</a></div>';
      }

      function fail(msg, opts) {
        opts = opts || {};
        ico.textContent = opts.icon || '…';
        title.textContent = opts.title || T.failTitle;
        lead.textContent = msg;
      }

      function copyLink(btn) {
        const path = btn.getAttribute('data-path');
        const full = location.origin + path;
        const label = btn.textContent;
        function done(ok) {
          btn.textContent = ok ? T.copied : T.copyManual;
          setTimeout(() => { btn.textContent = label; }, 2200);
        }
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(full).then(() => done(true)).catch(() => done(false));
        } else {
          try {
            const ta = document.createElement('textarea');
            ta.value = full; ta.style.position = 'fixed'; ta.style.opacity = '0';
            document.body.appendChild(ta); ta.focus(); ta.select();
            const ok = document.execCommand('copy');
            document.body.removeChild(ta);
            done(ok);
          } catch (e) { done(false); }
        }
      }

      function renderProducts(products) {
        rows.classList.remove('hidden');
        rows.innerHTML = products.map((p) => {
          const openLink = p.accessPath ? `<a href="${esc(p.accessPath)}">${T.openOnline}</a>` : '';
          const pdfLink = p.downloadPath ? `<a href="${esc(p.downloadPath)}">${T.downloadPdf}</a>` : '';
          const copyBtn = p.accessPath ? `<button type="button" class="copy-btn" data-path="${esc(p.accessPath)}">${T.copyLink}</button>` : '';
          return `<div class="row"><strong>${esc(p.title)}</strong><span class="row-actions">${openLink}${pdfLink}${copyBtn}</span></div>`;
        }).join('');
        rows.querySelectorAll('.copy-btn').forEach((btn) => btn.addEventListener('click', () => copyLink(btn)));
      }

      if (!sid) {
        ico.textContent = 'i';
        title.textContent = T.noSidTitle;
        lead.textContent = T.noSidLead;
        showHelp(null, T.noSidHelp);
        return;
      }

      // Stripe/Render/Webhook können kurz nacheinander laufen — daher mehrere Versuche
      // über ~15-20s, bevor wir dem Käufer einen echten Fehler zeigen.
      const RETRY_DELAYS_MS = [0, 2000, 3000, 4000, 6000];
      const RETRY_MESSAGES = T.retry;
      let attempt = 0;

      function tryComplete() {
        lead.textContent = RETRY_MESSAGES[Math.min(attempt, RETRY_MESSAGES.length - 1)];
        fetch('/api/checkout/complete?session_id=' + encodeURIComponent(sid))
          .then((r) => r.json())
          .then((d) => {
            if (d && d.ok) {
              // Warenkorb erst leeren, wenn die Zahlung wirklich bestätigt ist.
              try { localStorage.removeItem('zenith_cart_v1'); } catch (e) {}
              title.textContent = T.confirmedTitle;
              if (d.products && d.products.some((p) => p.accessPath)) {
                lead.textContent = T.plansUnlocked;
                renderProducts(d.products);
                note.classList.remove('hidden');
                note.textContent = T.saveLinkNote;
              } else {
                lead.innerHTML = T.orderFor1 + '<strong>' + esc(d.email || T.emailFallback) + '</strong>' + T.orderFor2;
                note.classList.remove('hidden');
                note.innerHTML = T.optionalAccount + '<a href="account.html" style="color:#ffe2a0">' + T.toAccount + '</a>';
              }
              return;
            }
            attempt++;
            if (attempt < RETRY_DELAYS_MS.length) { setTimeout(tryComplete, RETRY_DELAYS_MS[attempt]); return; }
            fail((d && d.message) || T.notConfirmedMsg, { icon: '!', title: T.notConfirmedTitle });
            showHelp(sid, T.notConfirmedHelp);
          })
          .catch(() => {
            attempt++;
            if (attempt < RETRY_DELAYS_MS.length) { setTimeout(tryComplete, RETRY_DELAYS_MS[attempt]); return; }
            fail(T.connErrMsg, { icon: '!', title: T.connErrTitle });
            showHelp(sid, T.connErrHelp);
          });
      }
      tryComplete();
    })();
  </script>
</body>
</html>
