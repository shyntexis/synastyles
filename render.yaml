services:
  - type: web
    name: zenith-gym-coaching-site
    runtime: node
    # Production needs persistent storage for buyer accounts/entitlements.
    # This usually requires a paid Render web service + disk. Do not enable paid deploy without owner approval.
    plan: starter
    region: frankfurt
    branch: main
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/checkout-status
    autoDeploy: true
    disk:
      name: zenith-buyer-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: NODE_VERSION
        value: 20.18.1
      - key: ZENITH_DATA_DIR
        value: /var/data
      - key: DEV_AUTH
        value: "0"
      - key: PUBLIC_SITE_URL
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_PRICE_STARTER_GYM_PLAN
        sync: false
      - key: STRIPE_PRICE_GYM_ERNAEHRUNG
        sync: false
      - key: STRIPE_PRICE_KOMPLETT_PAKET
        sync: false
      - key: STRIPE_PRICE_MINI_ESSENSPLAN
        sync: false
      - key: STRIPE_PRICE_MINI_SUPPLEMENT_GUIDE
        sync: false
      - key: STRIPE_PRICE_MINI_CARDIO_PLAN
        sync: false
      - key: STRIPE_PRICE_MINI_SCHLAF_ERHOLUNG
        sync: false
      - key: STRIPE_PRICE_MINI_TECHNIK_CHECKLISTE
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      # Optionale Variablen — bei Bedarf direkt im Render-Dashboard setzen
      # (bewusst NICHT als envVars mit sync:false gelistet, damit der Deploy
      # nicht auf fehlende Eingaben wartet):
      #   RESEND_API_KEY, MAIL_FROM (oder RESEND_FROM_EMAIL), MAIL_REPLY_TO
      #     -> Kauf-Bestätigungs-E-Mail über Resend. Ohne diese Werte wird
      #        keine Kauf-Mail versendet; die Zugangslinks funktionieren
      #        trotzdem über die Success-Seite nach dem Bezahlen.
      #   STRIPE_COUPON_LAUNCH20, STRIPE_COUPON_RESET15, STRIPE_COUPON_FRIEND10,
      #   STRIPE_COUPON_CREATOR_LEA (Vorlage)
      #     -> verknüpfen Rabattcodes aus data/discount-codes.json mit echten
      #        Stripe-Coupons. Ohne Verknüpfung ist ein Code nur Vorschau/
      #        Attribution und senkt den abgebuchten Betrag NICHT.
